<!DOCTYPE html>
<html lang="de">
<head>
 <link rel="stylesheet" href="Wochenrückblick.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tageschau für den Wochenrückblick</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:20px}
h1{text-align:center}
details{background:white;border-radius:8px;margin-bottom:15px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
summary{font-size:18px;font-weight:bold;cursor:pointer}
.day{margin-top:15px}
iframe{width:100%;max-width:560px;height:315px;border:none}
a{word-break:break-all}
</style>
</head>
<body>

<h1>Tageschau für den Wochenrückblick</h1>
<div id="weeks"></div>
<h2 id="testTitle" style="display:none;">
⭐ In dieser Woche wird ein Test geschrieben
</h2>

<div id="testWeeks"></div>

<hr>

<script type="module">
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJhdC0Y0Z305wtfKn6yhPL1fj80e7IzbE",
  authDomain: "wochenrueckblick-tagesschau.firebaseapp.com",
  projectId: "wochenrueckblick-tagesschau",
  storageBucket: "wochenrueckblick-tagesschau.firebasestorage.app",
  messagingSenderId: "56929188617",
  appId: "1:56929188617:web:58100b17446b958cb931d8",
  measurementId: "G-EMF6CYD1DJ"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
window.deleteDoc = deleteDoc;
window.doc = doc;
window.getDoc = getDoc;
window.setDoc = setDoc;
</script>

<script>

    const ADMIN_PASSWORD = "hjbxbgs!dkjvfo.";

let isAdmin = false;

const enteredPassword = prompt("Admin-Passwort (leer lassen für Besucher)");

if (enteredPassword === ADMIN_PASSWORD) {
    isAdmin = true;
    alert("Richtig ✅ Jetzt bist du Admin");
} else if (enteredPassword !== null && enteredPassword !== "") {
    alert("Der Code ist falsch ❌ Du bist kein Admin");
}

const API_KEY = "AIzaSyCHBW_Mk20mrV4xX3SS4u6QEQk54VxVNWA";
const PLAYLIST_ID = "PLQBHJI2P18MQ";

function getWeekRange(date){
    const d=new Date(date);
    const day=d.getDay();
    const diff=(day+1)%7;

    const saturday=new Date(d);
    saturday.setDate(d.getDate()-diff);

    const friday=new Date(saturday);
    friday.setDate(saturday.getDate()+6);

    return {
        key:saturday.toISOString().split("T")[0],
        title:saturday.toLocaleDateString("de-DE")+" - "+friday.toLocaleDateString("de-DE")
    };
}

function addVideoToWeek(video){
    const week=getWeekRange(video.date);
    let details=document.getElementById(week.key);

    if(!details){
        details=document.createElement("details");
        details.id=week.key;
        details.innerHTML = `
<summary style="display:flex;justify-content:space-between;align-items:center;">
    <span>${week.title}</span>

    ${
        isAdmin
        ? `
        <span>
            <button
                id="star-${week.key}"
                class="admin-btn"
                onclick="togglePinWeek('${week.key}', event)">
                ⭐
            </button>
            <button onclick="deleteWeek('${week.key}', event)"
                    style="color:red;">
                🗑️
            </button>
        </span>
        `
        : ""
    }

</summary>

<div class="week-content"></div>
`;

        const container=document.getElementById("weeks");
        container.insertBefore(details, container.firstChild);
    }

    const content=details.querySelector(".week-content");

    const dayName=new Date(video.date).toLocaleDateString("de-DE",{
        weekday:"long",
        day:"2-digit",
        month:"2-digit",
        year:"numeric"
    });

content.insertAdjacentHTML(
    "beforeend",
    `
    <div class="day">
        <h3>${dayName}</h3>
        <p><a href="${video.url}" target="_blank">${video.url}</a></p>
        <iframe src="https://www.youtube.com/embed/${video.videoId}" allowfullscreen></iframe>
    </div>
`
);

}

async function togglePinWeek(weekKey,event){

    event.stopPropagation();

    const ref = doc(window.db,"testWeeks",weekKey);
    const snap = await getDoc(ref);

    const button=document.getElementById("star-"+weekKey);

    if(snap.exists()){

        await deleteDoc(ref);

        button.classList.remove("pinned");

        const clone=document.getElementById("test-"+weekKey);

        if(clone){
            clone.remove();
        }

        if(document.getElementById("testWeeks").children.length===0){
            document.getElementById("testTitle").style.display="none";
        }

        return;
    }

    await setDoc(ref,{
        active:true
    });

    button.classList.add("pinned");

    document.getElementById("testTitle").style.display="block";

    const original=document.getElementById(weekKey);

    const clone=original.cloneNode(true);

    clone.id="test-"+weekKey;

    document.getElementById("testWeeks").appendChild(clone);

}

async function deleteWeek(weekKey, event){

    event.stopPropagation();

    if(!confirm("Diese Woche wirklich löschen?")){
        return;
    }

    await setDoc(
        doc(window.db,"deletedWeeks",weekKey),
        {
            deleted:true
        }
    );

    document.getElementById(weekKey).remove();

}

async function loadVideos(){
    const url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;

    const response=await fetch(url);
    const data=await response.json();
    console.log(data);

if (data.error) {
    console.error(data.error);
    alert(data.error.message);
    return;
}

if (!data.items) {
    alert("Keine Videos gefunden.");
    return;
}
    data.items.sort((a, b) =>
    new Date(b.snippet.publishedAt) -
    new Date(a.snippet.publishedAt)

);

    if(!data.items){
    document.getElementById("weeks").innerHTML =
        "<p>Keine Videos gefunden. Prüfe den API-Schlüssel.</p>";
    return;
}

const videos = data.items.map(item => ({
    date: item.snippet.publishedAt,
    url: `https://www.youtube.com/watch?v=${item.snippet.resourceId.videoId}`,
    videoId: item.snippet.resourceId.videoId
}));

videos.sort((a, b) =>
    new Date(a.date) - new Date(b.date)
);

for(const video of videos){

    const week=getWeekRange(video.date);

    const snap=await getDoc(
        doc(window.db,"deletedWeeks",week.key)
    );

    if(snap.exists()){
        continue;
    }

    addVideoToWeek(video);

}
}

loadVideos();
</script>

</body>
</html>
